name: "Area Maintainer Merge"

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  area-merge:
    # Only react to /area-maintainer-approved at the start of a comment or a
    # PR review body, and never to comments authored by bots. Comments posted
    # by this workflow use a GitHub App token, so (unlike the default
    # GITHUB_TOKEN) they DO trigger new issue_comment events — matching the
    # command anywhere in any comment body previously caused the bot to react
    # to its own status/error messages in an infinite loop.
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.type != 'Bot' &&
       startsWith(github.event.comment.body, '/area-maintainer-approved')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.type != 'Bot' &&
       startsWith(github.event.review.body, '/area-maintainer-approved')) ||
      github.event_name == 'check_suite'
    runs-on: ubuntu-latest
    steps:
      - name: Generate merge app token
        id: merge-app-token-generator
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.OVN_KUBERNETES_MERGE_BOT }}
          private-key: ${{ secrets.OVN_KUBERNETES_MERGE_BOT }}

      - name: Checkout base branch (for CODEOWNERS and scripts)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            CODEOWNERS
            .github/scripts/area-merge.js
          persist-credentials: false

      - name: Area maintainer merge check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          # The login the bot's own comments are posted under, used by
          # area-merge.js to recognize (and ignore) its own comments.
          BOT_LOGIN: ${{ steps.merge-app-token-generator.outputs.app-slug }}[bot]
        with:
          github-token: ${{ steps.merge-app-token-generator.outputs.token }}
          script: |
            const script = require('./.github/scripts/area-merge.js');
            await script({ github, context, core });
