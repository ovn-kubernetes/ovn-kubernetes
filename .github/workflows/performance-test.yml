name: performance-test
on:
  pull_request:
    branches: [ master ]

env:
  K8S_VERSION: v1.34.0
  KIND_CLUSTER_NAME: ovn
  KIND_INSTALL_INGRESS: true
  KIND_ALLOW_SYSTEM_WRITES: true
  PARALLEL: true
  CI_IMAGE_CACHE: tmp/image_cache/
  CI_IMAGE_BASE_TAR: image-base.tar
  CI_IMAGE_PR_TAR: image-pr.tar
  CI_DIST_IMAGES_OUTPUT: dist/images/_output/
  OVN_REPO: https://github.com/ovn-org/ovn.git
  OVN_GITREF: main

jobs:
  setup-tmate:
    runs-on: [oracle-vm-32cpu-128gb-x86-64] 
    outputs:
      ssh-command: ${{ steps.tmate.outputs.ssh-command }}
      ssh-address: ${{ steps.tmate.outputs.ssh-address }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup tmate session
      id: tmate
      uses: mxschmitt/action-tmate@v3
      with:
        detached: true

  performance-job:
    name: "PerformanceTest-6wrk-2infra"
    runs-on: [oracle-vm-32cpu-128gb-x86-64]
    timeout-minutes: 240
    needs: [build-pr]
    env:
      JOB_NAME: "PerformanceTest-1wrk-2infra"
      KIND_NUM_WORKER: "2"
      KIND_NUM_INFRA: "2"
      OVN_HA: "true"
      PLATFORM_IPV4_SUPPORT: "true"
      PLATFORM_IPV6_SUPPORT: "false"
      KIND_IPV4_SUPPORT: "true"
      KIND_IPV6_SUPPORT: "false"
      OVN_HYBRID_OVERLAY_ENABLE: "false"
      OVN_GATEWAY_MODE: "shared"
      OVN_MULTICAST_ENABLE: "false"
      KIND_INSTALL_PROMETHEUS: "true"
      KIND_PROMETHEUS_INFRA_ONLY: "true"
      KIND_INSTALL_METALLB: "true"
      OVN_DISABLE_SNAT_MULTIPLE_GWS: "false"
      OVN_SECOND_BRIDGE: "false"
      ENABLE_MULTI_NET: "false"
      ENABLE_NETWORK_SEGMENTATION: "false"
      OVN_ENABLE_INTERCONNECT: "true"
      OVN_NETWORK_QOS_ENABLE: "false"
      MULTI_POD_SUBNET: true
    steps:
    - name: Get PR info for issue comment
      if: github.event_name == 'issue_comment'
      id: pr_info
      run: |
        PR_NUMBER=${{ github.event.issue.number }}
        PR_INFO=$(curl -s -H "Authorization: token ${{ github.token }}" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")
        PR_SHA=$(echo "$PR_INFO" | jq -r .head.sha)
        echo "sha=$PR_SHA" >> $GITHUB_OUTPUT

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'issue_comment' && steps.pr_info.outputs.sha || github.sha }}

    - name: Runner Diagnostics
      if: always()
      uses: ./.github/actions/diagnostics

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go-controller/go.mod'
        cache: false
      id: go

    - name: Set up environment
      run: |
        export GOPATH=$(go env GOPATH)
        echo "GOPATH=$GOPATH" >> $GITHUB_ENV
        echo "$GOPATH/bin" >> $GITHUB_PATH

    - name: Free up disk space
      uses: ./.github/actions/free-disk-space

    - name: Setup /mnt/runner directory
      run: |
        sudo mkdir -pv /mnt/runner
        sudo chown $USER:$USER /mnt/runner

    - name: Setup /mnt/docker-data as docker storage
      run: |
        sudo mkdir -pv /mnt/docker-data
        sudo systemctl stop docker.socket docker
        [ -s "/etc/docker/daemon.json" ] && {
          cat "/etc/docker/daemon.json" | jq '. + {"data-root": "/mnt/docker-data"}' | sudo tee /etc/docker/daemon.$$
        } || {
          echo '{"data-root": "/mnt/docker-data"}' | sudo tee /etc/docker/daemon.$$
        }
        sudo mv -f /etc/docker/daemon.$$ /etc/docker/daemon.json
        sudo systemctl start docker docker.socket
        docker system info

    - name: Disable ufw
      run: |
        sudo ufw disable

    - name: Download test-image-pr
      uses: actions/download-artifact@v4
      with:
        name: test-image-pr

    - name: Cleanup container resources and images
      run: |
        echo "Cleaning up existing container resources..."
        
        # Cleanup Docker resources
        if command -v docker >/dev/null 2>&1; then
          echo "Cleaning up Docker resources..."
          # Stop and remove all containers
          docker ps -aq | xargs -r docker stop || true
          docker ps -aq | xargs -r docker rm -f || true
          # Remove all images except base ones needed for kind
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.ID}}" | grep -v "kindest/node\|registry:" | tail -n +2 | awk '{print $2}' | xargs -r docker rmi -f || true
          # Clean up volumes and networks
          docker volume prune -f || true
          docker network prune -f || true
          # Clean up build cache
          docker builder prune -a -f || true
          # Show remaining resources
          echo "Remaining Docker images:"
          docker images
          echo "Docker system df:"
          docker system df
        fi
        
        # Cleanup Podman resources  
        if command -v podman >/dev/null 2>&1; then
          echo "Cleaning up Podman resources..."
          # Stop and remove all containers
          podman ps -aq | xargs -r podman stop || true
          podman ps -aq | xargs -r podman rm -f || true
          # Remove all images except base ones needed for kind
          podman images --format "table {{.Repository}}:{{.Tag}}\t{{.ID}}" | grep -v "kindest/node\|registry:" | tail -n +2 | awk '{print $2}' | xargs -r podman rmi -f || true
          # Clean up volumes and networks
          podman volume prune -f || true
          podman network prune -f || true
          # Reset storage if needed
          podman system reset --force || true
          # Show remaining resources
          echo "Remaining Podman images:"
          podman images
          echo "Podman system df:"
          podman system df || true
        fi
        
        # Clean up any existing kind clusters
        if command -v kind >/dev/null 2>&1; then
          echo "Cleaning up existing kind clusters..."
          kind get clusters | xargs -r -I {} kind delete cluster --name {} || true
        fi
        
        # Clean up container runtime directories
        sudo rm -rf /var/lib/containers/* || true
        sudo rm -rf /tmp/kind* || true
        
        echo "Container cleanup completed"

    - name: Load container image
      run: |
        # Load image using the same runtime that will be used by KIND
        if [[ "${KIND_EXPERIMENTAL_PROVIDER:-docker}" == "podman" ]]; then
          echo "Loading image with podman..."
          podman load --input ${CI_IMAGE_PR_TAR} && rm -rf ${CI_IMAGE_PR_TAR}
        else
          echo "Loading image with docker..."
          docker load --input ${CI_IMAGE_PR_TAR} && rm -rf ${CI_IMAGE_PR_TAR}
        fi

    - name: Pre-flight system checks and configuration
      run: |
        echo "=== System Pre-flight Checks ==="
        
        # Check systemd status
        systemctl --version || true
        systemctl is-system-running || true
        
        # Check cgroups configuration
        echo "Cgroups check:"
        if [ -f /sys/fs/cgroup/cgroup.controllers ]; then
          echo "CGROUPS_VERSION=v2" >> $GITHUB_ENV
          echo "✓ Detected cgroups v2"
          cat /sys/fs/cgroup/cgroup.controllers
          # Ensure required cgroups controllers are available
          if ! grep -q "cpu\|memory\|pids" /sys/fs/cgroup/cgroup.controllers; then
            echo "⚠️  Warning: Required cgroups controllers may not be available"
          fi
        else
          echo "CGROUPS_VERSION=v1" >> $GITHUB_ENV  
          echo "✓ Detected cgroups v1"
          cat /proc/cgroups || true
        fi
        
        # Check kernel parameters
        echo "Kernel parameters:"
        echo "- net.bridge.bridge-nf-call-iptables: $(cat /proc/sys/net/bridge/bridge-nf-call-iptables 2>/dev/null || echo 'N/A')"
        echo "- net.ipv4.ip_forward: $(cat /proc/sys/net/ipv4/ip_forward)"
        
        # Enable required kernel modules
        sudo modprobe br_netfilter || true
        sudo modprobe overlay || true
        
        # Set required sysctl values
        sudo sysctl -w net.bridge.bridge-nf-call-iptables=1 || true
        sudo sysctl -w net.ipv4.ip_forward=1 || true
        
        # Check available resources
        echo "System resources:"
        echo "- Memory: $(free -h | grep Mem)"
        echo "- Disk: $(df -h / | tail -1)"
        echo "- CPU: $(nproc) cores"
        
        # Check container runtime and configure
        if command -v podman >/dev/null 2>&1 && command -v docker >/dev/null 2>&1; then
          echo "✓ Both Podman and Docker detected, using Docker for consistency with image loading"
          # Don't set KIND_EXPERIMENTAL_PROVIDER, let it default to docker
        elif command -v podman >/dev/null 2>&1; then
          echo "✓ Podman detected, setting KIND_EXPERIMENTAL_PROVIDER=podman"
          echo "KIND_EXPERIMENTAL_PROVIDER=podman" >> $GITHUB_ENV
          
          # Configure podman for better performance
          sudo mkdir -p /etc/containers
          sudo tee /etc/containers/containers.conf > /dev/null <<EOF
        [containers]
        default_ulimits = [
          "nofile=65536:65536", 
          "nproc=32768:32768"
        ]
        
        [engine]
        cgroup_manager = "systemd"
        events_logger = "journald"
        runtime = "crun"
        EOF
          # Restart podman service if running
          sudo systemctl restart podman.socket || true
        else
          echo "✓ Docker detected, using default configuration"
          # Ensure Docker is using systemd cgroup driver
          if [ -f /etc/docker/daemon.json ]; then
            sudo cp /etc/docker/daemon.json /etc/docker/daemon.json.bak
          fi
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
        {
          "data-root": "/mnt/docker-data",
          "exec-opts": ["native.cgroupdriver=systemd"],
          "log-driver": "json-file",
          "log-opts": {
            "max-size": "100m"
          },
          "storage-driver": "overlay2",
          "default-ulimits": {
            "nofile": {
              "Hard": 65536,
              "Name": "nofile", 
              "Soft": 65536
            }
          }
        }
        EOF
          sudo systemctl restart docker
        fi
        
        echo "=== Pre-flight checks completed ==="

    - name: Configure kubelet health optimizations for performance testing
      run: |
        # Set extended timeout for large cluster performance testing
        echo "KIND_WAIT_TIMEOUT=15m" >> $GITHUB_ENV

    - name: kind setup with infra nodes
      timeout-minutes: 45
      run: |
        export OVN_IMAGE="ovn-daemonset-fedora:pr"
        # Set enhanced timeouts for large cluster performance testing
        export KIND_CLUSTER_LOGLEVEL=2
        
        # Use the existing kind infrastructure but with enhanced kubelet health settings
        make -C test install-kind
        
        # Wait for kubelet health on all nodes with retries
        echo "Verifying kubelet health on all nodes..."
        for i in {1..10}; do
          echo "Health check attempt $i/10..."
          if kubectl get nodes --no-headers | awk '{print $2}' | grep -v Ready; then
            echo "Some nodes not ready, waiting 30s..."
            sleep 30
          else
            echo "All nodes are ready!"
            break
          fi
          
          if [ $i -eq 10 ]; then
            echo "Cluster health check failed after 10 attempts"
            echo "=== Node Status ==="
            kubectl get nodes -o wide
            echo "=== Node Conditions ==="
            kubectl describe nodes
            echo "=== Kubelet Logs ==="
            for node in $(kind get nodes --name ${KIND_CLUSTER_NAME}); do
              echo "--- Kubelet logs for $node ---"
              docker exec $node journalctl -u kubelet --no-pager -l --since "10 minutes ago" | tail -50
            done
            exit 1
          fi
        done

    - name: Install Prometheus on infra nodes
      run: |
        ./contrib/install-prometheus-infra.sh
    
    - name: Upload Prometheus installation logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prometheus-install-logs
        path: prometheus-install.log
        retention-days: 7

    - name: Download and setup kube-burner
      run: |
        KUBE_BURNER_VERSION=$(curl -s https://api.github.com/repos/kube-burner/kube-burner/releases/latest | jq -r .tag_name)
        curl -L https://github.com/kube-burner/kube-burner/releases/download/${KUBE_BURNER_VERSION}/kube-burner-Linux-x86_64.tar.gz | tar xz
        chmod +x kube-burner
        sudo mv kube-burner /usr/local/bin/
        echo "KUBE_BURNER_VERSION=${KUBE_BURNER_VERSION}" >> $GITHUB_ENV

    - name: Download kubelet-density-cni configuration
      run: |
        mkdir -p /tmp/kube-burner
        curl -o /tmp/kube-burner/kubelet-density-cni.yml https://raw.githubusercontent.com/kube-burner/kube-burner/main/examples/workloads/kubelet-density-cni/kubelet-density-cni.yml

    - name: Run kube-burner kubelet-density test
      timeout-minutes: 120 
      run: |
        kube-burner destroy --config /tmp/kube-burner/kubelet-density-cni.yml || true
        kube-burner init --config /tmp/kube-burner/kubelet-density-cni.yml

    - name: Runner Diagnostics
      if: always()
      uses: ./.github/actions/diagnostics

    - name: Export kind logs
      if: always()
      run: |
        mkdir -p /tmp/kind/logs
        kind export logs --name ${KIND_CLUSTER_NAME} --verbosity 4 /tmp/kind/logs

    - name: Export kubeconfig
      if: always()
      run: |
        mkdir -p /tmp/kubeconfig
        kind get kubeconfig --name ${KIND_CLUSTER_NAME} > /tmp/kubeconfig/kubeconfig

    - name: Upload kind logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kind-logs-performance-job-${{ github.run_id }}
        path: /tmp/kind/logs

    - name: Upload kubeconfig
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kubeconfig-performance-job-${{ github.run_id }}
        path: /tmp/kubeconfig/

  build-pr:
    name: Build-PR
    runs-on: ubuntu-24.04
    if: |
      (github.event_name != 'issue_comment') ||
      (github.event.issue.pull_request && 
       contains(github.event.comment.body, '/perf-test node-density-cni')) ||
      (github.event_name == 'workflow_dispatch')
    steps:
    - name: Restore PR image cache
      id: image_cache_pr
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.CI_IMAGE_CACHE }}
        key: ${{ github.run_id }}-image-cache-pr

    - name: Check if PR image build is needed
      id: is_pr_image_build_needed
      continue-on-error: true
      run: |
        set -x
        if [ -f ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR}.gz ]; then
            mkdir -p ${CI_DIST_IMAGES_OUTPUT}
            cp ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR}.gz ${CI_DIST_IMAGES_OUTPUT}/${CI_IMAGE_PR_TAR}.gz
            gunzip ${CI_DIST_IMAGES_OUTPUT}/${CI_IMAGE_PR_TAR}.gz
            echo "PR_IMAGE_RESTORED=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Get PR info for issue comment
      if: github.event_name == 'issue_comment' && steps.is_pr_image_build_needed.outputs.PR_IMAGE_RESTORED != 'true' && success()
      id: pr_info
      run: |
        PR_NUMBER=${{ github.event.issue.number }}
        PR_INFO=$(curl -s -H "Authorization: token ${{ github.token }}" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")
        PR_SHA=$(echo "$PR_INFO" | jq -r .head.sha)
        echo "sha=$PR_SHA" >> $GITHUB_OUTPUT

    - name: Check out code into the Go module directory
      if: steps.is_pr_image_build_needed.outputs.PR_IMAGE_RESTORED != 'true' && success()
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'issue_comment' && steps.pr_info.outputs.sha || github.sha }}

    - name: Set up Go
      if: steps.is_pr_image_build_needed.outputs.PR_IMAGE_RESTORED != 'true' && success()
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go-controller/go.mod'
        cache: false
      id: go

    - name: Build
      if: steps.is_pr_image_build_needed.outputs.PR_IMAGE_RESTORED != 'true' && success()
      run: |
        set -x
        pushd go-controller
           make gofmt
           make verify-go-mod-vendor
           make
           make windows
        popd

    - name: Build docker image
      if: steps.is_pr_image_build_needed.outputs.PR_IMAGE_RESTORED != 'true' && success()
      run: |
        pushd dist/images
          IMAGE=ovn-daemonset-fedora:pr
          make IMAGE=${IMAGE} \
            OVN_REPO=${{ env.OVN_REPO }} \
            OVN_GITREF=${{ env.OVN_GITREF }} \
            fedora-image
          mkdir _output
          docker save ${IMAGE} > _output/${CI_IMAGE_PR_TAR}
        popd

    - name: Cache PR image
      if: steps.is_pr_image_build_needed.outputs.PR_IMAGE_RESTORED != 'true' && success()
      continue-on-error: true
      run: |
        set -x
        if [ -f ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR} ]; then
            rm -f ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR}
        fi
        if [ -f ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR}.gz ]; then
           rm -f ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR}.gz
        fi
        mkdir -p ${CI_IMAGE_CACHE}/
        cp ${CI_DIST_IMAGES_OUTPUT}/${CI_IMAGE_PR_TAR} ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR}
        gzip ${CI_IMAGE_CACHE}/${CI_IMAGE_PR_TAR}

    - uses: actions/upload-artifact@v4
      with:
        name: test-image-pr
        path: ${{ env.CI_DIST_IMAGES_OUTPUT }}/${{ env.CI_IMAGE_PR_TAR }}
