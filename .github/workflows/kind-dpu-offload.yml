name: DPU Offload

on:
  pull_request:
    branches: [ master, release-* ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'mkdocs.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kind-dpu-offload-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  kind-dpu-offload:
    name: Kind DPU ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: overlay
            deploy-mode: overlay
            artifact-prefix: kind-dpu-offload
          - name: no-overlay
            deploy-mode: no-overlay
            artifact-prefix: kind-dpu-no-overlay
    uses: ovn-kubernetes/dpu-simulator/.github/workflows/kind-tft.yml@main
    with:
      deploy-mode: ${{ matrix.deploy-mode }}
      artifact-prefix: ${{ matrix.artifact-prefix }}
      # Test the PR/push commit instead of dpu-sim's default (master tip).
      ovn-kubernetes-repo-url: ${{ format('https://github.com/{0}', github.event.pull_request.head.repo.full_name || github.repository) }}
      ovn-kubernetes-ref: ${{ github.event.pull_request.head.sha || github.sha }}
