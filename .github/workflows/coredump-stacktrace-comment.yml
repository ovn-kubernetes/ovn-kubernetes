name: coredump-stacktrace-comment

on:
  workflow_run:
    workflows: ["ovn-ci"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: >-
    coredump-comment-${{
      github.event.workflow_run.pull_requests[0].number ||
      format(
        '{0}-{1}',
        github.event.workflow_run.head_repository.id ||
          github.event.repository.id,
        github.event.workflow_run.head_branch ||
          github.event.workflow_run.id
      )
    }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post coredump stack traces
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    steps:
    - name: Check out the trusted default branch
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.repository.default_branch }}
        persist-credentials: false

    - name: Find the pull request
      id: pr
      env:
        GH_TOKEN: ${{ github.token }}
        HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      run: |
        pr_number=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
        if [ -z "$pr_number" ]; then
          pr_number=$(gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
            --jq 'map(select(.state == "open"))[0].number // empty')
        fi
        echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

    - name: Find the coredump stack trace artifact
      id: artifact
      if: steps.pr.outputs.number != ''
      env:
        GH_TOKEN: ${{ github.token }}
        RUN_ID: ${{ github.event.workflow_run.id }}
        ARTIFACT_NAME: coredump-stacktraces-${{ github.event.workflow_run.id }}
      run: |
        found=$(gh api --method GET \
          "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
          -f name="$ARTIFACT_NAME" \
          --jq '.total_count > 0')
        echo "found=${found}" >> "$GITHUB_OUTPUT"

    - name: Download coredump stack traces
      if: steps.artifact.outputs.found == 'true'
      uses: actions/download-artifact@v8
      with:
        name: coredump-stacktraces-${{ github.event.workflow_run.id }}
        path: ${{ runner.temp }}/coredump-stacktraces
        github-token: ${{ github.token }}
        run-id: ${{ github.event.workflow_run.id }}

    - name: Format coredump stack trace comment
      id: comment
      if: steps.pr.outputs.number != ''
      env:
        RUN_ID: ${{ github.event.workflow_run.id }}
        RUN_URL: ${{ github.event.workflow_run.html_url }}
        TRACE_DIR: ${{ runner.temp }}/coredump-stacktraces
      run: |
        python3 contrib/coredump/github/format-comment.py \
          --input-dir "$TRACE_DIR" \
          --run-id "$RUN_ID" \
          --run-url "$RUN_URL" \
          --output coredump-stacktrace-comment.md \
          --allow-empty
        if [ -s coredump-stacktrace-comment.md ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Post coredump stack trace comment
      if: steps.comment.outputs.found == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
      run: |
        comment_id=$(gh api --paginate \
          "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
          --jq '.[] | select(
            .user.login == "github-actions[bot]" and
            (.body | contains("<!-- ovn-coredump-stacktraces -->"))
          ) | .id' | tail -n 1)
        method=POST
        endpoint="repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments"
        if [ -n "$comment_id" ]; then
          method=PATCH
          endpoint="repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}"
        fi
        jq -n --rawfile body coredump-stacktrace-comment.md \
          '{body: $body}' \
          | gh api --method "$method" "$endpoint" --input -
