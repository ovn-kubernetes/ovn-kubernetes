# This workflow previously built and deployed an unversioned docs site to
# GitHub Pages on every push to master (using mkdocs build + deploy-pages).
#
# The deploy job was removed because docs-versioning.yml now handles
# deployment using mike, which publishes a multi-version site to the
# gh-pages branch. Running both would cause them to overwrite each other.
#
# This workflow now only validates that docs build correctly on PRs,
# so authors get early feedback before merging.
name: Test Docs Build

on:
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: |
          pip install mkdocs-material
          pip install mkdocs-awesome-pages-plugin
          pip install $(mkdocs-get-deps)
      - run: mkdocs build --strict
      - name: Upload Artifact (Test)
        uses: actions/upload-artifact@v7
        with:
          name: test-mkdocs-site
          path: ./site
