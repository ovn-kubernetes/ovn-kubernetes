---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: uplinkstates.k8s.ovn.org
spec:
  group: k8s.ovn.org
  names:
    kind: UplinkState
    listKind: UplinkStateList
    plural: uplinkstates
    singular: uplinkstate
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.uplinkName
      name: Uplink
      type: string
    - jsonPath: .status.nodeName
      name: Node
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: UplinkState contains node-local discovery and gateway state for
          an Uplink.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          status:
            properties:
              conditions:
                description: Conditions reports node-local discovery state for this
                  resolved uplink.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              defaultGateways:
                description: |-
                  DefaultGateways are default route next-hop IPs discovered for the
                  selected host interface.
                items:
                  description: IPAddress is an IP address.
                  maxLength: 64
                  type: string
                  x-kubernetes-validations:
                  - message: must be a valid IP address
                    rule: isIP(self)
                maxItems: 2
                type: array
              hostInterfaceName:
                description: |-
                  HostInterfaceName is the host-visible Linux interface selected by
                  Uplink spec. It carries the host-side gateway L3 identity in all modes.
                maxLength: 15
                minLength: 1
                pattern: ^[^/\s]+$
                type: string
              ipAddresses:
                description: IPAddresses are host-side shared gateway IP addresses.
                items:
                  description: IPAddressCIDR is an IP address with a network prefix.
                  maxLength: 64
                  type: string
                  x-kubernetes-validations:
                  - message: must be a valid CIDR
                    rule: isCIDR(self)
                maxItems: 2
                type: array
              macAddress:
                description: MACAddress is the MAC address used for the OVN gateway
                  interface.
                pattern: ^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$
                type: string
              nodeName:
                description: NodeName is the node this state belongs to.
                type: string
              ovsBridge:
                description: OVSBridge contains resolved OVS bridge data.
                properties:
                  name:
                    description: Name is the resolved OVS bridge used for OVN bridge
                      mappings and flows.
                    maxLength: 15
                    minLength: 1
                    pattern: ^[^/\s]+$
                    type: string
                type: object
              type:
                description: Type is defined by the matched nodeConfig of the Uplink.
                enum:
                - OVSBridge
                type: string
              uplinkName:
                description: UplinkName is the Uplink this state belongs to.
                type: string
            type: object
        type: object
    selectableFields:
    - jsonPath: .status.uplinkName
    - jsonPath: .status.nodeName
    served: true
    storage: true
    subresources: {}
