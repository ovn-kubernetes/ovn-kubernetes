version: "2"
linters:
  default: none
  enable:
    - errcheck
    - forbidigo
    - ginkgolinter
    - govet
    - importas
    - ineffassign
    - nosprintfhostport
    - revive
    - staticcheck
    - testifylint
    - thelper
    - unused
  settings:
    forbidigo:
      forbid:
        - pattern: 'netlink\.(?:[A-Za-z0-9]+List(?:Filtered)?|LinkByName|LinkGetProtinfo|ConntrackDeleteFilters)\('
          msg: Use util/GetNetLinkOps wrappers or add a retry-enabled helper in pkg/util/net_linux.go so dump-capable netlink reads use RetryInterrupted-enabled handles.
        - pattern: 'netlink\.NewHandle(?:At|AtFrom)?\('
          msg: Use the handle helpers in pkg/util/net_linux.go so RetryInterrupted is enabled consistently.
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    importas:
      alias:
        - pkg: k8s.io/api/core/v1
          alias: corev1
        - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
          alias: metav1
        - pkg: k8s.io/apimachinery/pkg/api/errors
          alias: apierrors
        - pkg: k8s.io/apimachinery/pkg/util/errors
          alias: kerrors
        - pkg: sigs.k8s.io/controller-runtime
          alias: ctrl
        - pkg: github.com/ovn-kubernetes/libovsdb/ovsdb
          alias: ""
        - pkg: github.com/ovn-kubernetes/ovn-kubernetes/go-controller/pkg/node/util
          alias: nodeutil
        - pkg: github.com/ovn-kubernetes/ovn-kubernetes/go-controller/pkg/node/types
          alias: nodetypes
        - pkg: github.com/ovn-kubernetes/ovn-kubernetes/go-controller/hybrid-overlay/pkg/types
          alias: hotypes
        - pkg: github.com/containernetworking/cni/pkg/types
          alias: cnitypes
        - pkg: github.com/ovn-kubernetes/ovn-kubernetes/go-controller/pkg/cni/types
          alias: ovncnitypes
      no-unaliased: true
    revive:
      rules:
        - name: duplicated-imports
        - name: error-naming
        - name: unused-parameter
    staticcheck:
        checks:
          # Default
          - all
          - -ST1000
          - -ST1003
          - -ST1016
          - -ST1020
          - -ST1021
          - -ST1022
          # Disable quickfix checks
          - -QF*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - vendor
      - pkg/crd
      - third_party$
      - builtin$
      - examples$
    rules:
      # Tests intentionally use direct netlink reads for end-state assertions and
      # fake-kernel setup/verification, so the production-code guardrail does
      # not add value there.
      - linters:
          - forbidigo
        path: _test\.go
      # pkg/testing exposes low-level helpers that create and inspect real test
      # interfaces directly via netlink.
      - linters:
          - forbidigo
        path: pkg/testing/
      # This file defines the approved retry-enabled handle helpers and is the
      # single place where direct netlink handle construction is expected.
      - linters:
          - forbidigo
        path: pkg/util/net_linux\.go
      # Ignore SA1019 in k8s v1.35 rebase
      # https://github.com/ovn-kubernetes/ovn-kubernetes/issues/6102
      - linters:
          - staticcheck
        text: "SA1019.*NewSimpleClientset"
formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(k8s.io,sigs.k8s.io)
        - prefix(github.com/ovn-org)
        - prefix(github.com/ovn-kubernetes)
        - localmodule
        - dot
      custom-order: true
  exclusions:
    generated: lax
    paths:
      - vendor
      - pkg/crd
      - third_party$
      - builtin$
      - examples$
